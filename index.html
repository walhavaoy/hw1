<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Test App</title>
  <style>
    :root {
      --color-bg: #f5f5f5;
      --color-text: #333;
      --color-primary: #0066cc;
      --color-primary-hover: #0052a3;
      --color-card-bg: #fff;
      --color-border: #ddd;
      --color-greeting: #2e7d32;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 2rem;
      text-align: center;
      max-width: 28rem;
      width: 100%;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 1.75rem;
    }

    .time-display {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      font-variant-numeric: tabular-nums;
    }

    button {
      background: var(--color-primary);
      color: var(--color-card-bg);
      border: none;
      border-radius: 0.25rem;
      padding: 0.625rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--color-primary-hover);
    }

    button:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .greeting-output {
      margin-top: 1rem;
      font-size: 1.125rem;
      color: var(--color-greeting);
      min-height: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 data-testid="heading">Hello World</h1>
    <div class="time-display" data-testid="time-display" aria-label="Current time"></div>
    <button data-testid="greeting-button">Say Hello</button>
    <p data-testid="greeting-output" class="greeting-output" aria-live="polite"></p>
  </div>

  <script>
    (function () {
      var timeEl = document.querySelector('[data-testid="time-display"]');
      var btnEl = document.querySelector('[data-testid="greeting-button"]');
      var greetEl = document.querySelector('[data-testid="greeting-output"]');

      function updateTime() {
        if (timeEl) {
          timeEl.textContent = new Date().toLocaleTimeString();
        }
      }

      updateTime();
      setInterval(updateTime, 1000);

      if (btnEl && greetEl) {
        btnEl.addEventListener('click', function () {
          greetEl.textContent = 'Hello, World! Welcome to the test app.';
        });
      }
    })();
  </script>
</body>
</html>
