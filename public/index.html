<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Test App</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --success: #22c55e;
      --radius: 0.5rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      max-width: 24rem;
      width: 100%;
      text-align: center;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 0.875rem;
    }

    .result.has-data {
      color: var(--success);
      font-weight: 500;
      font-size: 1rem;
    }

    .result.has-error {
      color: #ef4444;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title" data-testid="heading">Hello World</div>
    <div class="subtitle">Click below to fetch a greeting from the API</div>
    <button class="btn" data-testid="greeting-button" data-action="fetch-greeting">Get Greeting</button>
    <div class="result" data-testid="greeting-output" aria-live="polite">Response will appear here</div>
  </div>

  <script>
    (function () {
      document.body.addEventListener('click', function (e) {
        var target = e.target;
        if (!target || !target.closest('[data-action="fetch-greeting"]')) return;

        var btn = target.closest('[data-action="fetch-greeting"]');
        var resultEl = document.querySelector('[data-testid="greeting-output"]');
        if (!btn || !resultEl) return;

        btn.disabled = true;
        resultEl.className = 'result';
        resultEl.textContent = 'Loading...';

        fetch('/api/greeting')
          .then(function (response) {
            if (!response.ok) {
              throw new Error('Server responded with status ' + response.status);
            }
            return response.json();
          })
          .then(function (data) {
            resultEl.textContent = data.message;
            resultEl.className = 'result has-data';
          })
          .catch(function (err) {
            console.error('Greeting fetch failed:', err);
            resultEl.textContent = 'Error: ' + err.message;
            resultEl.className = 'result has-error';
          })
          .finally(function () {
            btn.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
